<div class="header">
  <button class="btn-show" type="button" (click)="toggleForm()">New Todo!</button>
</div>

<app-todo-form *ngIf="showForm" (create)="createTodo($event)"></app-todo-form>
<ul>
  <li *ngFor="let todo of todos">
    {{ todo.title }}

    <button (click)="deleteTodo(todo.id!)">Deletar</button>
  </li>
</ul>
